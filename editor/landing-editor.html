<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Éditeur Landing Guide — Region Lovers</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  body { display: flex; flex-direction: column; background: #f4f5f8; color: #191E55; }

  .topbar {
    background: #191E55;
    color: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .topbar h1 { font-size: 15px; margin: 0; font-weight: 700; color: #B68207; text-transform: uppercase; letter-spacing: .04em; }
  .topbar select, .topbar button {
    font: inherit; font-size: 13px; padding: 7px 12px; border-radius: 6px; border: none; cursor: pointer;
  }
  .topbar select { background: #2d3490; color: #fff; }
  .topbar button { background: rgba(255,255,255,0.12); color: #fff; }
  .topbar button:hover { background: rgba(255,255,255,0.22); }
  .topbar .spacer { flex: 1; }
  #export-btn { background: #B68207 !important; color: #191E55 !important; font-weight: 700; }
  #export-btn:hover { background: #c8930f !important; }
  #publish-btn { background: #2e7d32 !important; color: #fff !important; font-weight: 700; }
  #publish-btn:hover { background: #388e3c !important; }
  #export-status { font-size: 12px; color: #CCD3DD; max-width: 320px; }
  .sync-status { font-size: 12px; color: #B68207; font-style: italic; }

  .main { flex: 1; display: flex; min-height: 0; }

  .sidebar { width: 420px; flex-shrink: 0; background: #fff; border-right: 1px solid #e2e4ea; display: flex; flex-direction: column; }
  .tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px; border-bottom: 1px solid #e2e4ea; background: #fafafd; }
  .tab-btn {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    padding: 6px 10px; border-radius: 20px; border: 1px solid #d5d8e2; background: #fff; color: #4a5168; cursor: pointer;
  }
  .tab-btn.active { background: #191E55; color: #fff; border-color: #191E55; }

  #form { flex: 1; overflow-y: auto; padding: 16px; }
  .field-group { margin-bottom: 22px; }
  .field-group h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #B68207; margin: 0 0 10px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
  .field-row { display: block; margin-bottom: 12px; }
  .field-label { display: block; font-size: 12px; color: #4a5168; margin-bottom: 4px; }
  .field-note { font-size: 12px; color: #8a6200; background: #FBF3DF; padding: 8px 12px; border-radius: 6px; margin: 0 0 14px; line-height: 1.5; }
  .field-row input[type=text], .field-row input[type=url], .field-row textarea {
    width: 100%; font: inherit; font-size: 13px; padding: 8px 10px; border: 1px solid #d5d8e2; border-radius: 6px; resize: vertical;
  }
  .field-row textarea { min-height: 60px; }
  .field-row input:focus, .field-row textarea:focus { outline: 2px solid #B68207; border-color: #B68207; }

  .image-field { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .image-preview { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid #d5d8e2; background: #f0f0f4; }
  .image-status { font-size: 11px; color: #B68207; font-style: italic; }
  .btn-clear { font-size: 11px; padding: 4px 8px; border-radius: 6px; border: 1px solid #d5d8e2; background: #fff; cursor: pointer; }

  .preview-wrap { flex: 1; overflow: auto; background: #ddd; padding: 20px; display: flex; justify-content: center; }
  #preview-frame { width: 100%; max-width: 1400px; height: 900px; border: none; background: #fff; box-shadow: 0 0 30px rgba(0,0,0,0.15); }

  /* ---- Volet Mode d'emploi ---- */
  #guide-toggle {
    position: fixed; top: 50%; right: 0; transform: translateY(-50%);
    z-index: 20;
    background: #191E55; color: #B68207; border: none; cursor: pointer;
    padding: 14px 8px; border-radius: 8px 0 0 8px; font-size: 12px; font-weight: 700;
    writing-mode: vertical-rl; text-transform: uppercase; letter-spacing: .05em;
    box-shadow: -2px 0 10px rgba(0,0,0,0.15);
  }
  #guide-toggle:hover { background: #2d3490; }

  #guide-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 90vw;
    background: #fff; border-left: 1px solid #e2e4ea; z-index: 19;
    transform: translateX(100%); transition: transform 0.25s ease;
    display: flex; flex-direction: column; box-shadow: -6px 0 24px rgba(0,0,0,0.15);
  }
  #guide-panel.open { transform: translateX(0); }

  .guide-header {
    background: #191E55; color: #fff; padding: 16px 20px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .guide-header h2 { font-size: 15px; margin: 0; color: #B68207; text-transform: uppercase; letter-spacing: .04em; }
  .guide-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; line-height: 1; }

  #guide-body { flex: 1; overflow-y: auto; padding: 18px 20px; }

  .guide-step { display: flex; gap: 12px; margin-bottom: 22px; }
  .guide-step-num {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; background: #191E55; color: #B68207;
    font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center;
  }
  .guide-step-body h4 { margin: 0 0 6px; font-size: 13px; color: #191E55; }
  .guide-step-body p { margin: 0 0 8px; font-size: 12.5px; color: #4a5168; line-height: 1.5; }
  .guide-step-body ol { margin: 6px 0 8px; padding-left: 18px; font-size: 12.5px; color: #4a5168; line-height: 1.6; }
  .guide-step-body ol li { margin-bottom: 6px; }
  .guide-step-body code {
    background: #f2f2f6; border-radius: 4px; padding: 1px 5px; font-size: 11.5px;
    font-family: 'Courier New', monospace; display: inline-block; line-height: 1.6;
  }
  .guide-note { font-size: 11.5px; color: #8a6200; background: #FBF3DF; padding: 6px 10px; border-radius: 6px; }
  .guide-checklist { list-style: none; margin: 0; padding: 0; }
  .guide-checklist li { margin-bottom: 8px; font-size: 12.5px; color: #4a5168; }
  .guide-checklist label { display: flex; align-items: center; gap: 8px; cursor: pointer; }

  @media (max-width: 1000px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; height: 45vh; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Éditeur Landing Guide</h1>
  <select id="project-select"></select>
  <button id="new-project-btn">+ Nouveau</button>
  <button id="duplicate-project-btn">Dupliquer</button>
  <button id="reset-project-btn">Réinitialiser (contenu Tenerife)</button>
  <button id="delete-project-btn">Supprimer</button>
  <span id="sync-status" class="sync-status"></span>
  <div class="spacer"></div>
  <span id="export-status"></span>
  <button id="export-btn">Télécharger le ZIP (fichiers + images)</button>
  <button id="publish-btn">Publier en ligne</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="tabs" id="tabs"></div>
    <div id="form"></div>
  </div>
  <div class="preview-wrap">
    <iframe id="preview-frame" srcdoc="<!doctype html><html><head><meta charset=&quot;utf-8&quot;>
<link href=&quot;https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&amp;family=Inter:wght@300;400;500;600&amp;family=Meow+Script&amp;display=swap&quot; rel=&quot;stylesheet&quot;>
<style>  :root {
    --navy:       #191E55;
    --navy-mid:   #21277a;
    --navy-light: #2d3490;
    --yellow:     #B68207;
    --yellow-mid: #8a6200;
    --yellow-deep: #5a4000;
    --white:      #FFFFFF;
    --grey:       #CCD3DD;
    --grey-text:  #4a5168;
    --off-white:  #f7f6f1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    background: var(--white);
    color: var(--navy);
    overflow-x: hidden;
  }

  /* ============================
     NAV
  ============================ */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 44px;
    background: rgba(25, 30, 85, 0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    text-decoration: none;
  }

  .nav-logo-img {
    height: 44px;
    width: auto;
    max-width: min(340px, 82vw);
    display: block;
    mix-blend-mode: screen;
  }

  .nav-cta {
    background: var(--yellow);
    color: var(--navy);
    padding: 10px 22px;
    border-radius: 50px;
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 800;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background 0.2s, transform 0.2s;
  }

  .nav-cta:hover {
    background: var(--yellow-mid);
    color: var(--white);
    transform: translateY(-1px);
  }

  /* ============================
     HERO
  ============================ */
  .hero {
    min-height: 100vh;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 110px 40px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Grain texture overlay */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url(&quot;data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E&quot;);
    opacity: 0.03;
    pointer-events: none;
  }

  /* Halo doré — même intensité que la section pivot */
  .hero-glow {
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(249, 213, 99, 0.11) 0%, transparent 68%);
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Cover mockup */
  .cover-wrap {
    position: relative;
    z-index: 2;
    margin-bottom: 48px;
    animation: floatY 5s ease-in-out infinite;
  }

  @keyframes floatY {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }

  .cover-card {
    width: 240px;
    background: var(--navy-mid);
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 4px 0 rgba(255,255,255,0.05) inset,
      0 0 0 1px rgba(255,255,255,0.09),
      0 20px 50px rgba(0, 0, 0, 0.42),
      0 0 36px rgba(182, 130, 7, 0.45),
      0 0 72px rgba(249, 213, 99, 0.22),
      0 0 120px rgba(182, 130, 7, 0.12);
  }

  /* Largeur fixe sur la carte ; hauteur = proportion réelle du PNG (pas de crop forcé) */
  .cover-visual {
    width: 100%;
    background: var(--navy);
    position: relative;
    overflow: hidden;
    line-height: 0;
  }

  .cover-visual img {
    width: 100%;
    height: auto;
    display: block;
  }

  .cover-badge {
    position: absolute;
    top: -12px;
    right: -16px;
    background: var(--yellow);
    color: var(--navy);
    font-family: 'Raleway', sans-serif;
    font-size: 10px;
    font-weight: 800;
    padding: 5px 10px;
    border-radius: 50px;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(249,213,99,0.4);
  }

  /* Hero text */
  .hero-kicker {
    font-family: 'Meow Script', cursive;
    font-size: 22px;
    color: var(--yellow);
    margin-bottom: 8px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.3s forwards;
  }

  .hero-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    color: var(--white);
    line-height: 1.12;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.5s forwards;
  }

  .hero-title .dest {
    display: block;
    font-size: clamp(28px, 4.8vw, 54px);
    line-height: 1.05;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .hero-title em {
    display: block;
    font-style: italic;
    color: var(--yellow);
    text-transform: none;
    font-family: 'Raleway', sans-serif;
    font-size: clamp(18px, 2.35vw, 28px);
    font-weight: 700;
    margin-top: 6px;
    line-height: 1.28;
    letter-spacing: -0.01em;
  }

  .hero-subtitle {
    font-size: clamp(15px, 1.8vw, 18px);
    color: rgba(255,255,255,0.88);
    max-width: 500px;
    line-height: 1.75;
    font-weight: 400;
    margin: 0 auto 40px;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.7s forwards;
  }

  .hero-actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.9s forwards;
  }

  .btn-primary {
    background: var(--yellow);
    color: var(--navy);
    padding: 15px 34px;
    border-radius: 50px;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    font-weight: 800;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }

  .btn-primary:hover {
    background: var(--yellow-mid);
    color: var(--white);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(182,130,7,0.4);
  }

  .btn-ghost {
    border: 1.5px solid rgba(255,255,255,0.28);
    color: rgba(255,255,255,0.82);
    padding: 15px 28px;
    border-radius: 50px;
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.5);
    color: var(--white);
  }

  /* Hero stats */
  .hero-stats {
    display: flex;
    gap: 0;
    margin-top: 60px;
    padding-top: 36px;
    border-top: 1px solid rgba(255,255,255,0.08);
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.1s forwards;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-item {
    padding: 0 32px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .stat-item:last-child { border-right: none; }

  .stat-num {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    font-size: 30px;
    color: var(--yellow);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.62);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============================
     SECTION HELPERS
  ============================ */
  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 50px;
    margin-bottom: 22px;
  }

  .tag-yellow {
    background: var(--yellow);
    color: var(--navy);
  }

  .tag-navy-outline {
    border: 1.5px solid rgba(25,30,85,0.2);
    color: var(--navy);
  }

  .tag-white-outline {
    border: 1.5px solid rgba(255,255,255,0.28);
    color: rgba(255,255,255,0.88);
  }

  .section-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .section-title-lg {
    font-size: clamp(26px, 4vw, 48px);
  }

  .section-title-md {
    font-size: clamp(22px, 3vw, 38px);
  }

  .section-title .title-accent-gold {
    color: var(--yellow);
  }

  /* Séparateur hero → pivot (même bleu #191E55) */
  .navy-stack-divider {
    background: var(--navy);
    padding: 18px 40px 22px;
    position: relative;
    z-index: 1;
  }

  .navy-stack-divider__line {
    position: relative;
    max-width: 520px;
    margin: 0 auto;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(182, 130, 7, 0.2) 18%,
      rgba(249, 213, 99, 0.55) 50%,
      rgba(182, 130, 7, 0.2) 82%,
      transparent 100%
    );
  }

  .navy-stack-divider__gem {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 8px;
    height: 8px;
    background: linear-gradient(145deg, var(--yellow-mid), var(--yellow));
    border-radius: 1px;
    box-shadow:
      0 0 0 5px var(--navy),
      0 2px 20px rgba(182, 130, 7, 0.35);
  }

  /* ============================
     PIVOT (La différence)
  ============================ */
  .pivot {
    background: var(--navy);
    padding: 48px 40px 100px;
    position: relative;
    overflow: hidden;
  }

  .pivot::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url(&quot;data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E&quot;);
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }

  .pivot-glow {
    position: absolute;
    width: 520px;
    height: 520px;
    background: radial-gradient(circle, rgba(249, 213, 99, 0.11) 0%, transparent 68%);
    bottom: -140px;
    right: -90px;
    pointer-events: none;
    z-index: 0;
  }

  .pivot-inner {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 70px;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .pivot-lede {
    font-family: 'Inter', sans-serif;
    font-size: clamp(14px, 1.5vw, 16px);
    font-style: italic;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.78);
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }

  .pivot-title {
    color: var(--white);
    margin-bottom: 22px;
    line-height: 1.08;
  }

  .pivot-title span { color: var(--yellow); }

  .pivot-body {
    font-size: 16px;
    color: rgba(255,255,255,0.8);
    line-height: 1.8;
    font-weight: 300;
    margin-bottom: 28px;
  }

  .pivot-quote {
    background: rgba(255, 255, 255, 0.07);
    border-left: 3px solid var(--yellow);
    padding: 18px 22px;
    border-radius: 8px;
  }

  .pivot-quote p {
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    line-height: 1.7;
    font-style: italic;
    font-family: 'Inter', sans-serif;
  }

  .pivot-quote cite {
    display: block;
    font-size: 12px;
    color: var(--yellow);
    font-style: normal;
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* Mockup stack — extraits réels du guide */
  .pages-stack {
    position: relative;
    height: 400px;
  }

  .page-mock {
    position: absolute;
    width: 200px;
    height: 310px;
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .page-mock-1 { left: 0; top: 40px; transform: rotate(-4deg); z-index: 1; }
  .page-mock-2 { left: 78px; top: 0; z-index: 3; }
  .page-mock-3 { left: 156px; top: 50px; transform: rotate(4deg); z-index: 1; }

  .page-mock-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* ============================
     FEUILLETAGE VISUEL
  ============================ */
  .feuilletage {
    background: var(--off-white);

  /* ============================
     BENEFITS TABLE
  ============================ */
  .benefits {

    padding: 100px 40px;
  }

  .benefits-inner {
    max-width: 860px;
    margin: 0 auto;
  }

  .benefits-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 50px;
  }

  .benefits-table thead th {
    padding: 12px 24px;
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  .benefits-table thead th:first-child {
    color: rgba(255,255,255,0.55);
    text-align: left;
    width: 42%;

  .benefits-table thead th:last-child {
    color: var(--yellow);
    text-align: left;
  }

  .benefits-table tbody tr {
    border-top: 1px solid rgba(255,255,255,0.07);
    transition: background 0.2s;
  }

  .benefits-table tbody tr:hover {
    background: rgba(255,255,255,0.03);
  }

  .benefits-table tbody td {
    padding: 18px 24px;
    vertical-align: middle;
  }

  .benefits-table tbody td:first-child {
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .feat-pill {
    display: inline-block;
    background: rgba(249,213,99,0.12);
    color: var(--yellow);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 50px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .benefits-table .feat-pill {
    display: inline-flex;
    align-items: baseline;
    gap: 0.35em;
    flex-wrap: wrap;
    padding: 10px 16px 10px 14px;
    font-size: 11px;
  }

  .benefits-table .feat-pill__num {
    font-size: clamp(22px, 3.2vw, 30px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
    text-transform: none;
    font-variant-numeric: tabular-nums;
  }

  .benefits-table tbody td:last-child {
    color: rgba(255,255,255,0.92);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.65;
  }

  /* ============================
     INSPIRATION
  ============================ */
  .inspiration {
    background: var(--white);
    padding: 100px 40px;
  }

  .inspiration-inner { max-width: 1180px; margin: 0 auto; }

  /* 6 cartes en 2 colonnes + mockup smartphone en 3e colonne */
  .inspi-layout {
    display: grid;
    grid-template-columns: 1fr 1fr minmax(160px, 240px);
    gap: 24px 28px;
    margin-top: 50px;
    align-items: center;
  }

  .inspi-cards {
    grid-column: 1 / 3;
  }

  .inspi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .inspi-preview {
    margin: 0;
    justify-self: center;
    align-self: center;
  }

  .inspi-preview--phone {
    max-width: 220px;
    width: 100%;
    background: transparent;
    border: none;
    padding: 4px 6px 12px;
    overflow: visible;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .inspi-preview__tilt {
    transform: rotate(-6deg);
    transform-origin: 50% 55%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
    filter:
      drop-shadow(0 10px 20px rgba(25, 30, 85, 0.12))
      drop-shadow(0 3px 8px rgba(25, 30, 85, 0.08));
  }

  /* Hauteur plafonnée pour s’aligner visuellement sur le bloc des 6 cartes */
  .inspi-preview--phone img {
    width: auto;
    max-width: min(200px, 100%);
    max-height: clamp(280px, 31vw, 350px);
    height: auto;
    display: block;
    object-fit: contain;
    margin: 0 auto;
  }

  @media (hover: hover) {
    .inspi-preview--phone:hover .inspi-preview__tilt {
      transform: rotate(-4deg) translateY(-2px);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .inspi-preview__tilt {
      transform: rotate(-3deg);
    }
    .inspi-preview--phone:hover .inspi-preview__tilt {
      transform: rotate(-3deg);
    }
  }

  .inspi-card {
    background: var(--off-white);
    border-radius: 14px;
    padding: 22px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: default;
    border: 1px solid rgba(25,30,85,0.05);
  }

  .inspi-emoji { font-size: 28px; flex-shrink: 0; line-height: 1; }

  .inspi-text strong {
    display: block;
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 3px;
  }

  .inspi-text span {
    font-size: 13px;
    color: var(--grey-text);
    font-weight: 400;
    line-height: 1.45;
  }

  /* ============================
     SOCIAL PROOF
  ============================ */
  .proof {
    background: var(--navy);
    padding: 100px 40px;
  }

  .proof-inner { max-width: 900px; margin: 0 auto; }

  .proof-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 50px;
    margin-bottom: 60px;
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
  }

  .proof-stat {
    padding: 40px 24px;
    text-align: center;
    background: rgba(255,255,255,0.03);
  }

  .proof-stat-num {
    font-family: 'Raleway', sans-serif;
    font-size: 46px;
    font-weight: 900;
    color: var(--yellow);
    line-height: 1;
    margin-bottom: 10px;
  }

  .proof-stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.68);
    font-weight: 400;
    line-height: 1.5;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Raleway', sans-serif;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .review-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 24px;
  }

  .review-stars {
    color: var(--yellow);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .review-text {
    font-size: 15px;
    color: rgba(255,255,255,0.92);
    line-height: 1.65;
    font-weight: 400;
    font-style: italic;
    margin-bottom: 16px;
  }

  .review-author {
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .review-origin {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    font-weight: 300;
    margin-top: 2px;
  }

  /* ============================
     CTA FINAL
  ============================ */
  .cta-final {
    background: var(--navy);
    padding: 120px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-glow {
    position: absolute;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(249,213,99,0.07) 0%, transparent 65%);
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
  }

  .cta-inner {
    position: relative;
    z-index: 2;
    max-width: 600px;
    margin: 0 auto;
  }

  .cta-title {
    font-family: 'Raleway', sans-serif;
    font-size: clamp(30px, 5vw, 60px);
    font-weight: 900;
    color: var(--white);
    text-transform: uppercase;
    line-height: 1.05;
    margin-bottom: 18px;
  }

  .cta-title em {
    font-style: italic;
    color: var(--yellow);
    text-transform: none;
    font-family: 'Meow Script', cursive;
    font-size: 0.95em;
    line-height: 1.3;
  }

  .cta-body {
    font-size: 17px;
    color: rgba(255,255,255,0.86);
    line-height: 1.75;
    font-weight: 400;
    margin-bottom: 50px;
  }

  .price-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 36px 44px;
    display: inline-block;
    min-width: 320px;
    margin-bottom: 28px;
  }

  .price-label {
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.58);
    margin-bottom: 12px;
  }

  .price-amount {
    font-family: 'Raleway', sans-serif;
    font-size: 58px;
    font-weight: 900;
    color: var(--white);
    line-height: 1;
    margin-bottom: 8px;
  }

  .price-amount sup {
    font-size: 22px;
    vertical-align: super;
  }

  .price-note {
    font-size: 14px;
    color: rgba(255,255,255,0.62);
    font-weight: 300;
    margin-bottom: 24px;
  }

  .payment-logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .payment-logos img {
    height: 26px;
    width: auto;
    border-radius: 4px;
    opacity: 0.88;
  }

  .cta-reassurances {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 22px;
  }

  .reassure-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  .reassure-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    color: rgba(255,255,255,0.72);
  }

  .reassure-item strong {
    color: rgba(255,255,255,0.92);
    font-weight: 600;
  }

  .reassure-item .check {
    color: var(--yellow);
    font-size: 14px;
    font-weight: 700;
  }

  /* ============================
     ENGAGEMENTS
  ============================ */
  .engagements {
    background: var(--white);
    padding: 100px 40px;
  }

  .engagements-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .engagements-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 56px;
    align-items: center;
  }

  .eng-portrait {
    margin: 0 0 22px 0;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(25,30,85,0.14);
    border: 1px solid rgba(25,30,85,0.06);
    max-width: min(400px, 100%);
  }

  .eng-portrait img {
    width: 100%;
    height: auto;
    display: block;
  }

  .eng-body {
    font-size: 16px;
    color: var(--grey-text);
    line-height: 1.75;
    font-weight: 400;
  }

  .engagements-grid > div:first-child p.eng-body:first-of-type {
    margin-bottom: 24px;
  }

  .eng-signature {
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid var(--grey);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .eng-sig-name {
    font-family: 'Meow Script', cursive;
    font-size: 26px;
    color: var(--yellow);
    line-height: 1.2;
  }

  .eng-sig-role {
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--grey-text);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  .engagements-box {
    background: var(--off-white);
    border-radius: 16px;
    padding: 32px;
    border: 1px solid rgba(25,30,85,0.07);
  }

  .eng-box-label {
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: var(--yellow);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 22px;
    line-height: 1.45;
    max-width: 28em;
  }

  .eng-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .eng-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .eng-num {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    font-size: 13px;
    color: var(--yellow);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .eng-txt {
    font-size: 14px;
    color: var(--navy);
    font-weight: 400;
    line-height: 1.55;
  }

     FOOTER
  ============================ */
  footer {
    background: #0f1235;
    padding: 40px 44px 28px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .footer-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .footer-brand {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .footer-contact {
    font-size: 13px;
    color: rgba(255,255,255,0.46);
  }

  .footer-contact a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
  }

  .footer-contact a:hover {
    color: var(--yellow);
  }

  .footer-links {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .footer-links a {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-links a:hover {
    color: var(--yellow);
  }

  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    padding-top: 20px;
  }

  .footer-copy {
    font-size: 12px;
    color: rgba(255,255,255,0.32);
  }

  /* ============================
     RESPONSIVE
  ============================ */
  @media (max-width: 1040px) {
    .inspi-layout {
      grid-template-columns: 1fr;
      gap: 36px;
    }
    .inspi-cards { grid-column: auto; }
    .inspi-preview--phone {
      max-width: min(260px, 88%);
      margin-left: auto;
      margin-right: auto;
    }
    .inspi-preview--phone img {
      max-height: min(340px, 52vh);
    }
    .inspi-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 800px) {
    nav { padding: 14px 20px; }
    .hero { padding: 90px 20px 24px; }
    .navy-stack-divider { padding: 14px 20px 18px; }
    .stat-item { padding: 0 16px; }
    .pivot-inner { grid-template-columns: 1fr; gap: 40px; }
    .pages-stack { display: none; }
    .feuilletage-grid { grid-template-columns: 1fr; }
    .engagements-grid { grid-template-columns: 1fr; gap: 40px; align-items: stretch; }
    .hero-title .dest { font-size: clamp(26px, 6.2vw, 44px); }
    .proof-stats { grid-template-columns: 1fr; gap: 2px; }
    .reviews-grid { grid-template-columns: 1fr; }
    .inspi-grid { grid-template-columns: 1fr 1fr; }
    .benefits-table thead { display: none; }
    .benefits-table td { display: block; padding: 6px 0; }
    .price-box { min-width: unset; width: 100%; }
    footer { flex-direction: column; text-align: center; }
    section { padding-left: 20px !important; padding-right: 20px !important; }
  }

  @media (max-width: 480px) {
    .inspi-grid { grid-template-columns: 1fr; }
    .hero-title .dest { font-size: 30px; }
  }

/* ---------------- State & persistence (API + MongoDB) ---------------- */

// Les projets sont stockés côté serveur (MongoDB) pour permettre à toute
// l'équipe d'y accéder et de reprendre le travail où il a été laissé, depuis
// n'importe quel poste. Le jeton d'authentification est posé par l'app
// Next.js parente dans localStorage (même origine que cet iframe).

function authHeaders() {
  const token = localStorage.getItem('auth_token');
  return token ? { Authorization: `Bearer ${token}` } : {};
}

async function apiCall(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...authHeaders(), ...(opts.headers || {}) },
  });
  let json = null;
  try { json = await res.json(); } catch (e) { /* pas de corps JSON */ }

  if (res.status === 401) {
    try { window.parent.postMessage({ type: 'rl-session-expired' }, window.location.origin); } catch (e) { /* ignore */ }
  }

  return { ok: res.ok, status: res.status, json };
}

async function fetchProjectList() {
  const { ok, json } = await apiCall('/api/projects');
  if (!ok) throw new Error(json?.message || 'Erreur de chargement des projets.');
  return json.projects || [];
}

async function fetchProject(slug) {
  const { ok, status, json } = await apiCall(`/api/projects/${encodeURIComponent(slug)}`);
  if (status === 404) return null;
  if (!ok) throw new Error(json?.message || 'Erreur de chargement du projet.');
  return json.project;
}

async function saveProjectRemote(slug, d, imgs) {
  const { ok, json } = await apiCall(`/api/projects/${encodeURIComponent(slug)}`, {
    method: 'PUT',
    body: JSON.stringify({ data: d, images: imgs }),
  });
  if (!ok) throw new Error(json?.message || 'Erreur de sauvegarde.');
}

async function deleteProjectRemote(slug) {
  const { ok, json } = await apiCall(`/api/projects/${encodeURIComponent(slug)}`, { method: 'DELETE' });
  if (!ok) throw new Error(json?.message || 'Erreur de suppression.');
}

function setSyncStatus(text) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = text;
}

let currentSlug = null;
let data = {}; // { fieldName: string }
let images = {}; // { fieldName: { filename, dataUrl } }
let projectSlugs = [];
let saveTimer = null;

function newProjectData() {
  const d = {};
  ALL_FIELDS.forEach(fld => { if (fld.type !== IMAGE) d[fld.name] = TENERIFE_DEFAULTS[fld.name] || ''; });
  return d;
}

function persistCurrent() {
  if (!currentSlug) return;
  renderGuidePanel();
  clearTimeout(saveTimer);
  setSyncStatus('Modifications en attente...');
  saveTimer = setTimeout(async () => {
    try {
      setSyncStatus('Enregistrement...');
      await saveProjectRemote(currentSlug, data, images);
      setSyncStatus('Enregistré ✓');
      setTimeout(() => setSyncStatus(''), 1500);
    } catch (e) {
      console.error(e);
      setSyncStatus('Erreur de sauvegarde — voir la console');
    }
  }, 700);
}

/* ---------------- Form rendering ---------------- */

const formEl = document.getElementById('form');
const tabsEl = document.getElementById('tabs');
let activeTab = SCHEMA[0].tab;

function renderTabs() {
  tabsEl.innerHTML = '';
  SCHEMA.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (t.tab === activeTab ? ' active' : '');
    btn.textContent = t.tab;
    btn.onclick = () => { activeTab = t.tab; renderTabs(); renderForm(); };
    tabsEl.appendChild(btn);
  });
}

function fieldValue(name) {
  return data[name] || '';
}

function renderForm() {
  formEl.innerHTML = '';
  const tabDef = SCHEMA.find(t => t.tab === activeTab);
  tabDef.groups.forEach(group => {
    const gWrap = document.createElement('div');
    gWrap.className = 'field-group';
    const h = document.createElement('h3');
    h.textContent = group.label;
    gWrap.appendChild(h);

    group.fields.forEach(fld => {
      if (fld.type === NOTE) {
        const p = document.createElement('p');
        p.className = 'field-note';
        p.textContent = fld.text;
        gWrap.appendChild(p);
        return;
      }

      const row = document.createElement('label');
      row.className = 'field-row';
      const lbl = document.createElement('span');
      lbl.className = 'field-label';
      lbl.textContent = fld.label;
      row.appendChild(lbl);

      if (fld.type === IMAGE) {
        const wrap = document.createElement('div');
        wrap.className = 'image-field';
        const preview = document.createElement('img');
        preview.className = 'image-preview';
        const img = images[fld.name];
        if (img) preview.src = img.url;
        else preview.style.display = 'none';
        const status = document.createElement('span');
        status.className = 'image-status';
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async () => {
          const file = input.files[0];
          if (!file) return;

          // aperçu instantané pendant l'envoi
          const tempReader = new FileReader();
          tempReader.onload = () => { preview.src = tempReader.result; preview.style.display = 'block'; };
          tempReader.readAsDataURL(file);

          status.textContent = 'Envoi vers WordPress...';
          const uploaded = await uploadImageToSite(file);
          if (!uploaded) {
            status.textContent = '';
            return;
          }
          images[fld.name] = uploaded;
          preview.src = uploaded.url;
          status.textContent = '';
          persistCurrent();
          updatePreviewImage(fld.name);
        };
        wrap.appendChild(preview);
        wrap.appendChild(input);
        wrap.appendChild(status);
        if (img) {
          const clear = document.createElement('button');
          clear.textContent = '✕ retirer';
          clear.type = 'button';
          clear.className = 'btn-clear';
          clear.onclick = () => { delete images[fld.name]; persistCurrent(); renderForm(); updatePreviewImage(fld.name); };
          wrap.appendChild(clear);
        }
        row.appendChild(wrap);
      } else {
        const input = document.createElement(fld.type === TEXTAREA ? 'textarea' : 'input');
        if (fld.type !== TEXTAREA) input.type = fld.type === URL_T ? 'url' : 'text';
        input.value = fieldValue(fld.name);
        input.placeholder = fld.placeholder || '';
        input.oninput = () => {
          data[fld.name] = input.value;
          persistCurrent();
          updatePreviewText(fld.name);
        };
        row.appendChild(input);
      }
      gWrap.appendChild(row);
    });
    formEl.appendChild(gWrap);
  });
}

/* ---------------- Preview binding ---------------- */

const iframe = document.getElementById('preview-frame');

function previewDoc() {
  return iframe.contentDocument;
}

function updatePreviewText(name) {
  const doc = previewDoc();
  if (!doc) return;
  const value = fieldValue(name);
  doc.querySelectorAll(`[data-field-text="${name}"]`).forEach(el => { el.textContent = value; });
  doc.querySelectorAll(`[data-field-text-nl2br="${name}"]`).forEach(el => {
    el.innerHTML = '';
    value.split('\n').forEach((line, i) => {
      if (i > 0) el.appendChild(doc.createElement('br'));
      el.appendChild(doc.createTextNode(line));
    });
  });
  doc.querySelectorAll(`[data-hide-if-empty="${name}"]`).forEach(el => {
    el.style.display = value.trim() ? '' : 'none';
  });
}

function updatePreviewImage(name) {
  const doc = previewDoc();
  if (!doc) return;
  const img = images[name];
  doc.querySelectorAll(`[data-field-img="${name}"]`).forEach(el => {
    if (img) { el.src = img.url; el.closest('[data-hide-if-empty-img]')?.style && (el.closest(`[data-hide-if-empty-img="${name}"]`).style.display = ''); }
    else { el.removeAttribute('src'); }
  });
  const wrapper = doc.querySelector(`[data-hide-if-empty-img="${name}"]`);
  if (wrapper) wrapper.style.display = img ? '' : 'none';
}

function refreshWholePreview() {
  ALL_FIELDS.forEach(fld => {
    if (fld.type === IMAGE) updatePreviewImage(fld.name);
    else updatePreviewText(fld.name);
  });
}

iframe.addEventListener('load', refreshWholePreview);

/* ---------------- Project management ---------------- */

const projectSelect = document.getElementById('project-select');

function refreshProjectSelect() {
  projectSelect.innerHTML = '';
  projectSlugs.forEach(slug => {
    const opt = document.createElement('option');
    opt.value = slug;
    opt.textContent = slug;
    if (slug === currentSlug) opt.selected = true;
    projectSelect.appendChild(opt);
  });
}

async function loadProject(slug) {
  currentSlug = slug;
  setSyncStatus('Chargement...');

  let proj = null;
  try {
    proj = await fetchProject(slug);
  } catch (e) {
    console.error(e);
    setSyncStatus('Erreur de chargement — voir la console');
  }

  if (!proj) {
    data = newProjectData();
    images = {};
    data.project_slug = slug;
    if (!projectSlugs.includes(slug)) projectSlugs.push(slug);
    try {
      await saveProjectRemote(slug, data, images);
      setSyncStatus('');
    } catch (e) {
      console.error(e);
      setSyncStatus('Erreur de sauvegarde — voir la console');
    }
  } else {
    data = proj.data || {};
    images = proj.images || {};
    if (!data.project_slug) data.project_slug = slug;
    setSyncStatus('');
  }

  refreshProjectSelect();
  renderTabs();
  renderForm();
  refreshWholePreview();
  renderGuidePanel();
}

document.getElementById('new-project-btn').onclick = async () => {
  const slug = prompt('Nom du projet (ex: loire, tenerife, gran-canaria) :');
  if (!slug) return;
  const clean = slug.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
  await loadProject(clean);
};

document.getElementById('duplicate-project-btn').onclick = async () => {
  if (!currentSlug) return;
  const slug = prompt('Nouveau nom pour la copie :', currentSlug + '-copie');
  if (!slug) return;
  const clean = slug.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
  const copyData = JSON.parse(JSON.stringify(data));
  const copyImages = JSON.parse(JSON.stringify(images));
  copyData.project_slug = clean;
  try {
    setSyncStatus('Duplication...');
    await saveProjectRemote(clean, copyData, copyImages);
  } catch (e) {
    console.error(e);
    setSyncStatus('Erreur de duplication — voir la console');
    return;
  }
  if (!projectSlugs.includes(clean)) projectSlugs.push(clean);
  await loadProject(clean);
};

document.getElementById('reset-project-btn').onclick = () => {
  if (!currentSlug) return;
  if (!confirm(`Remplacer tout le texte du projet "${currentSlug}" par le contenu par défaut de Tenerife ? Les images et les réglages de l'onglet PROJET sont conservés.`)) return;
  const freshText = newProjectData();
  ALL_FIELDS.forEach(fld => {
    if (fld.type !== IMAGE && !fld.name.startsWith('project_')) {
      data[fld.name] = freshText[fld.name];
    }

function slugify(str) {
  return String(str || '').trim().toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function downloadBlob(filename, blob) {

}

/* ---- Minimal ZIP writer (store method, no compression, no deps) ---- */

const CRC_TABLE = (() => {
  const table = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    table[n] = c >>> 0;
  }
  return table;
})();

function crc32(bytes) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) {
    crc = CRC_TABLE[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function buildZip(files) {
  // files: [{ name: string, bytes: Uint8Array }]
  const encoder = new TextEncoder();
  const localParts = [];
  const centralParts = [];
  let offset = 0;

  files.forEach(file => {
    const nameBytes = encoder.encode(file.name);
    const crc = crc32(file.bytes);
    const size = file.bytes.length;

    const localHeader = new Uint8Array(30 + nameBytes.length);
    const lv = new DataView(localHeader.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0, true);
    lv.setUint16(8, 0, true);
    lv.setUint16(10, 0, true);
    lv.setUint16(12, 0, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true);
    lv.setUint32(22, size, true);
    lv.setUint16(26, nameBytes.length, true);
    lv.setUint16(28, 0, true);
    localHeader.set(nameBytes, 30);

    localParts.push(localHeader, file.bytes);

    const centralHeader = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(centralHeader.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    centralHeader.set(nameBytes, 46);
    centralParts.push(centralHeader);

    offset += localHeader.length + file.bytes.length;
  });

  const centralSize = centralParts.reduce((a, p) => a + p.length, 0);
  const centralOffset = offset;

  const endRecord = new Uint8Array(22);
  const ev = new DataView(endRecord.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  ev.setUint16(20, 0, true);

  return new Blob([...localParts, ...centralParts, endRecord], { type: 'application/zip' });
}

/* ---------------- Publication directe (API REST WordPress + ACF) ---------------- */

function basicAuthHeader(username, appPassword) {
  return 'Basic ' + btoa(`${username}:${appPassword}`);
}

function guessMime(filename) {
  const ext = (filename.match(/\.([a-z0-9]+)$/i) || [, 'png'])[1].toLowerCase();
  const map = { jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png', gif: 'image/gif', webp: 'image/webp' };
  return map[ext] || 'application/octet-stream';
}

async function wpFetch(siteUrl, path, authHeader, opts = {}) {
  const res = await fetch(`${siteUrl}${path}`, {
    ...opts,
    headers: { Authorization: authHeader, ...(opts.headers || {}) },
  });
  let json = null;
  try { json = await res.json(); } catch (e) { /* réponse non-JSON */ }
  if (!res.ok) {
    const msg = json?.message || `${res.status} ${res.statusText}`;
    throw new Error(msg);
  }
  return json;
}

async function findPageId(siteUrl, slug, authHeader) {
  const results = await wpFetch(
    siteUrl,
    `/wp-json/wp/v2/pages?search=${encodeURIComponent(slug)}&per_page=50&status=publish,future,draft,pending,private&context=edit`,
    authHeader
  );
  const match = (results || []).find(p => {
    const tpl = typeof p.template === 'string' ? p.template : '';
    return tpl.includes('page-landing-guide.php') &&
      (p.slug.includes(slug) || (p.title?.raw || p.title?.rendered || '').toLowerCase().includes(slug));
  });
  if (match) return match.id;
  // repli : premier résultat utilisant le bon template, même sans correspondance de slug
  const fallback = (results || []).find(p => (p.template || '').includes('page-landing-guide.php'));
  return fallback ? fallback.id : null;
}

async function uploadImage(siteUrl, authHeader, filename, bytes) {
  const json = await wpFetch(siteUrl, '/wp-json/wp/v2/media', authHeader, {
    method: 'POST',
    headers: {
      'Content-Disposition': `attachment; filename="${filename}"`,
      'Content-Type': guessMime(filename),
    },
    body: bytes,
  });
  return { mediaId: json.id, url: json.source_url };
}

// Envoie une image choisie localement directement dans la médiathèque
// WordPress du site configuré dans l'onglet PROJET, et ne conserve que le
// lien (URL + ID média) — jamais le fichier lui-même — pour rester léger
// côté stockage (Mongo) et éviter toute re-synchronisation manuelle.
async function uploadImageToSite(file) {
  const siteUrl = (data.project_site_url || '').replace(/\/+$/, '');
  const username = data.project_wp_username || '';
  const appPassword = data.project_wp_app_password || '';

  if (!siteUrl || !username || !appPassword) {
    alert("Renseigne d'abord l'adresse du site, le nom d'utilisateur et le mot de passe d'application dans l'onglet PROJET pour pouvoir ajouter des images.");
    return null;
  }

  try {
    const authHeader = basicAuthHeader(username, appPassword);
    const bytes = new Uint8Array(await file.arrayBuffer());
    const { mediaId, url } = await uploadImage(siteUrl, authHeader, file.name, bytes);
    return { url, mediaId, filename: file.name, siteUrl };
  } catch (e) {
    alert(`Échec de l'envoi de l'image vers WordPress : ${e.message}`);
    return null;
  }
}

document.getElementById('publish-btn').onclick = async () => {
  const slug = data.project_slug || currentSlug || 'destination';
  const siteUrl = (data.project_site_url || '').replace(/\/+$/, '');
  const username = data.project_wp_username || '';
  const appPassword = data.project_wp_app_password || '';
  const statusEl = document.getElementById('export-status');

  if (!siteUrl || !username || !appPassword) {
    statusEl.textContent = 'Renseigne l\'adresse du site, le nom d\'utilisateur et le mot de passe d\'application dans l\'onglet PROJET.';
    return;
  }

  const authHeader = basicAuthHeader(username, appPassword);

  try {
    statusEl.textContent = 'Recherche de la page...';
    const pageId = await findPageId(siteUrl, slug, authHeader);
    if (!pageId) {
      statusEl.textContent = `Aucune page "Landing Guide" trouvée pour "${slug}". Crée d'abord la page dans WordPress (Pages > Ajouter, modèle Landing Guide).`;
      return;
    }

    const acfPayload = Object.fromEntries(
      ALL_FIELDS.filter(x => x.type !== IMAGE && !x.name.startsWith('project_')).map(x => [x.name, data[x.name] || ''])
    );

    // Les images ont déjà été envoyées dans la médiathèque au moment où elles
    // ont été ajoutées. Si elles pointent vers le site qu'on publie
    // maintenant, on réutilise directement leur ID média — sinon (image
    // ajoutée pour un autre site, cas d'une destination dupliquée) on la
    // retéléverse ici, à partir de son URL d'origine.
    const imageFieldNames = Object.keys(images);
    let imgDone = 0;
    for (const fieldName of imageFieldNames) {
      const img = images[fieldName];
      imgDone++;
      if (img.siteUrl === siteUrl && img.mediaId) {
        acfPayload[fieldName] = img.mediaId;
        continue;
      }
      statusEl.textContent = `Envoi des images (${imgDone}/${imageFieldNames.length})...`;
      const res = await fetch(img.url);
      const bytes = new Uint8Array(await res.arrayBuffer());
      const { mediaId } = await uploadImage(siteUrl, authHeader, img.filename, bytes);
      acfPayload[fieldName] = mediaId;
    }

    statusEl.textContent = 'Enregistrement des textes...';
    await wpFetch(siteUrl, `/wp-json/wp/v2/pages/${pageId}`, authHeader, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ acf: acfPayload }),
    });

    statusEl.textContent = `Publié avec succès (page #${pageId}) — ${Object.keys(acfPayload).length} champ(s) mis à jour.`;
  } catch (e) {
    statusEl.textContent = `Erreur : ${e.message}`;
  }
};

        développeur avec les identifiants SSH ci-dessous.</p>
        <ol>
          <li>Décompresser <code>livraison-${esc(slug)}.zip</code></li>
          <li>Déposer via SFTP les images dans
          <code>wp-content/themes/genesis-sample/assets/</code>, et
          <code>populate-${esc(slug)}.php</code> à la racine WordPress
          (<code>${esc(wpRoot)}</code>)</li>
          <li>Connexion SSH :<br><code>ssh ${esc(sshUser)}@${esc(sshHost)}</code></li>
          <li>Exécution :<br><code>cd ${esc(wpRoot)}<br>wp eval-file populate-${esc(slug)}.php</code></li>
        </ol>
        `}
      </div>
    </div>

    <div class="guide-step">
      <div class="guide-step-num">4</div>
      <div class="guide-step-body">
        <h4>Configurer le CTA de vente</h4>
        <p>Créer le produit sur SendOwl, puis renseigner <strong>cta_price</strong> et
        <strong>cta_url</strong> (onglet CTA FINAL) avec l'URL de paiement — avant ou
        après publication, ça reste modifiable.</p>
      </div>
    </div>

    <div class="guide-step">
      <div class="guide-step-num">5</div>
      <div class="guide-step-body">
        <h4>Traduire avec WPML (si site multilingue)</h4>
        <ol>
          <li>WPML &gt; Réglages &gt; Traduction de champs personnalisés : vérifier que
          <strong>cta_url</strong> est en "Traduire" (une URL SendOwl par langue).</li>
          <li>Pages &gt; cliquer sur le crayon sous chaque langue, une par une — jamais
          la traduction automatique en masse.</li>
          <li>Si un champ n'apparaît pas dans l'éditeur de traduction : ouvrir
          directement la page traduite dans l'éditeur WordPress standard, tous les
          champs ACF s'y affichent normalement.</li>
        </ol>
      </div>
    </div>

    <div class="guide-step">
      <div class="guide-step-num">✓</div>
      <div class="guide-step-body">
        <h4>Checklist finale</h4>
        <ul class="guide-checklist">
          <li><label><input type="checkbox"> Contenu relu, aucun texte oublié</label></li>
          <li><label><input type="checkbox"> Toutes les images s'affichent</label></li>
          <li><label><input type="checkbox"> cta_price et cta_url corrects par langue</label></li>
          <li><label><input type="checkbox"> Boutons "Obtenir le guide" (nav + hero + CTA) renvoient vers SendOwl</label></li>
          <li><label><input type="checkbox"> Liens CGV / Mentions légales / Contact fonctionnels</label></li>
          <li><label><input type="checkbox"> Cache WP Engine purgé</label></li>
        </ul>
      </div>
    </div>
  `;
}

document.getElementById('guide-toggle').onclick = () => {
  document.getElementById('guide-panel').classList.toggle('open');
};
document.getElementById('guide-close').onclick = () => {
  document.getElementById('guide-panel').classList.remove('open');
};

/* ---------------- Init ---------------- */

(async function init() {
  try {
    const list = await fetchProjectList();
    projectSlugs = list.map(p => p.slug);
  } catch (e) {
    console.error(e);
    setSyncStatus('Impossible de contacter le serveur — voir la console');
  }
  if (projectSlugs.length === 0) projectSlugs = ['tenerife'];
  await loadProject(projectSlugs[0]);
})();

</script>
